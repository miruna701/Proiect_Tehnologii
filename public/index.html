<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplicatie de cautare produse din magazin" />
    <title>Magazin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container text-center">
        <h1 class="site-title">Magazin</h1>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-6">

            <div class="card-custom">
              <p class="question">Care este numele produsului?</p>

              <div class="d-flex gap-2">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control search-input"
                  placeholder="ex. Widget, Gadget..."
                  autocomplete="off"
                />
                <button type="button" id="searchBtn" class="btn btn-dark px-4">
                  Cauta
                </button>
              </div>

              <p class="hint">Cautarea nu tine cont de majuscule sau minuscule.</p>

              <div id="resultArea"></div>
            </div>

          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
